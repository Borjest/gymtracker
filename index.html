const NS='http://www.w3.org/2000/svg';
function sv(tag,attrs,ch){
  const e=document.createElementNS(NS,tag||'svg');
  if(attrs)Object.entries(attrs).forEach(([k,v])=>e.setAttribute(k,v));
  if(ch)ch.forEach(c=>c&&e.appendChild(c));
  return e;
}
function sp(d,f,s,sw){const p=sv('path',{d,fill:f||'none'});if(s)p.setAttribute('stroke',s);if(sw)p.setAttribute('stroke-width',sw);return p;}
function sc(cx,cy,r,f,s){const c=sv('circle',{cx,cy,r,fill:f||'none'});if(s)c.setAttribute('stroke',s);return c;}
function st(x,y,txt,f,fs,fw,ta){
  const t=sv('text',{x,y,fill:f||'#fff','font-size':fs||10,'font-weight':fw||'bold','text-anchor':ta||'middle','font-family':'Arial'});
  t.textContent=txt;return t;
}

function mannequinSVG(pm,sm,userColor,h=240){
  const W=120,H=h;
  const col=userColor,sec='#FF9A00',dim='#12122a';
  const c=(fill,x,y,rx,ry,opacity)=>{
    const e=document.createElementNS(NS,'ellipse');
    e.setAttribute('cx',x);e.setAttribute('cy',y);
    e.setAttribute('rx',rx);e.setAttribute('ry',ry);
    e.setAttribute('fill',fill);
    if(opacity)e.setAttribute('opacity',opacity);
    return e;
  };
  const r=(fill,x,y,w,hh,rx)=>{
    const e=document.createElementNS(NS,'rect');
    e.setAttribute('fill',fill);e.setAttribute('x',x);e.setAttribute('y',y);
    e.setAttribute('width',w);e.setAttribute('height',hh);
    if(rx)e.setAttribute('rx',rx);
    return e;
  };
  const poly=(fill,pts,op)=>{
    const e=document.createElementNS(NS,'polygon');
    e.setAttribute('points',pts);e.setAttribute('fill',fill);
    if(op)e.setAttribute('opacity',op);
    return e;
  };
  const mCol=(muscle)=>{
    if(pm&&pm.includes(muscle))return col;
    if(sm&&sm.includes(muscle))return sec;
    return dim;
  };
  const svg=document.createElementNS(NS,'svg');
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  svg.setAttribute('width',W);svg.setAttribute('height',H);

  // Scale factor
  const s=H/240;
  const tx=(x)=>x;
  const ty=(y)=>y*s;

  // Head
  svg.appendChild(c('#1e1e3a',60,18*s,12,14*s));
  // Neck
  svg.appendChild(r('#1e1e3a',54,30*s,12,8*s));

  // Shoulders
  svg.appendChild(c(mCol('shoulders'),34,38*s,12,8*s));
  svg.appendChild(c(mCol('shoulders'),86,38*s,12,8*s));

  // Chest / upper body
  svg.appendChild(r(mCol('chest'),40,36*s,40,32*s,4));

  // Arms upper (biceps/triceps)
  const armCol=mCol('biceps')!==dim?mCol('biceps'):mCol('triceps');
  svg.appendChild(r(armCol,22,40*s,12,28*s,4));
  svg.appendChild(r(armCol,86,40*s,12,28*s,4));

  // Forearms
  const faCol=mCol('forearms');
  svg.appendChild(r(faCol,23,70*s,10,22*s,3));
  svg.appendChild(r(faCol,87,70*s,10,22*s,3));

  // Hands
  svg.appendChild(c('#1a1a30',28,95*s,7,5*s));
  svg.appendChild(c('#1a1a30',92,95*s,7,5*s));

  // Abs / core
  const coreCol=mCol('core');
  [[0,0],[1,0],[0,1],[1,1],[0,2],[1,2]].forEach(([col2,row])=>{
    svg.appendChild(r(mCol('core'),47+col2*10,70*s+row*10*s,8,8*s,2));
  });

  // Back (shown as a slightly different shade on chest area)
  const backCol=mCol('back');
  if(backCol!==dim){
    const bg=r(backCol,40,36*s,40,32*s,4);bg.setAttribute('opacity','0.6');
    svg.appendChild(bg);
  }

  // Hips/glutes
  svg.appendChild(r(mCol('glutes'),38,100*s,44,20*s,4));

  // Quads
  svg.appendChild(r(mCol('quads'),40,120*s,18,36*s,4));
  svg.appendChild(r(mCol('quads'),62,120*s,18,36*s,4));

  // Hamstrings
  const hamCol=mCol('hamstrings');
  if(hamCol!==dim){
    const h1=r(hamCol,40,120*s,18,36*s,4);h1.setAttribute('opacity','0.5');
    const h2=r(hamCol,62,120*s,18,36*s,4);h2.setAttribute('opacity','0.5');
    svg.appendChild(h1);svg.appendChild(h2);
  }

  // Calves
  svg.appendChild(r(mCol('calves'),42,158*s,14,28*s,4));
  svg.appendChild(r(mCol('calves'),64,158*s,14,28*s,4));

  // Feet
  svg.appendChild(c('#1e1e3a',49,188*s,13,6*s));
  svg.appendChild(c('#1e1e3a',71,188*s,13,6*s));

  return svg;
}

function getExercisesForDay(uid,dayNum){
  const u=DATA.users[uid],conf=UC[uid],rt=RT[conf.gender];
  const base=(rt[dayNum]&&rt[dayNum].ex)||[];
  const custom=(u.customEx&&u.customEx[dayNum])||[];
  const deleted=(u.deletedEx&&u.deletedEx[dayNum])||[];
  const ord=(u.exOrder&&u.exOrder[dayNum]);
  let all=[...base.filter(e=>!deleted.includes(e.id)),...custom];
  if(ord&&ord.length){
    const mp=Object.fromEntries(all.map(e=>[e.id,e]));
    const sorted=ord.map(id=>mp[id]).filter(Boolean);
    const extra=all.filter(e=>!ord.includes(e.id));
    all=[...sorted,...extra];
  }
  return all;
}
function deleteExercise(uid,dayNum,exId){
  const u=DATA.users[uid];

  u.customEx=u.customEx||{};u.customEx[dayNum]=u.customEx[dayNum]||[];
  u.customEx[dayNum]=u.customEx[dayNum].filter(e=>e.id!==exId);
  saveData();
}
function moveExercise(uid,dayNum,fromIdx,toIdx){
  const u=DATA.users[uid];
  const exs=getExercisesForDay(uid,dayNum);
  if(fromIdx<0||toIdx<0||fromIdx>=exs.length||toIdx>=exs.length)return;
  const arr=exs.map(e=>e.id);const[moved]=arr.splice(fromIdx,1);arr.splice(toIdx,0,moved);
  u.exOrder=u.exOrder||{};u.exOrder[dayNum]=arr;saveData();
}

function calcStats(u){
  const cks=Object.entries(u.checkins||{}).filter(([,v])=>v).map(([d])=>d).sort();
  const total=cks.length;
  let streak=0,mx=0,cur=0,prev=null;
  cks.forEach(d=>{
    const dd=prev?Math.round((new Date(d+'T12:00:00')-new Date(prev+'T12:00:00'))/86400000):0;
    cur=(!prev||dd===1)?cur+1:1;if(cur>mx)mx=cur;prev=d;
  });
  const t=today();const recent=cks.filter(d=>d<=t&&d>=(()=>{const x=new Date(t+'T12:00:00');x.setDate(x.getDate()-6);return x.toISOString().split('T')[0];})());
  streak=0;let s=new Date(t+'T12:00:00');
  for(let i=0;i<60;i++){const ds=s.toISOString().split('T')[0];if(u.checkins&&u.checkins[ds])streak++;else if(i>0)break;s.setDate(s.getDate()-1);}
  const weeklyData=[];for(let w=7;w>=0;w--){const wks=[];for(let d=0;d<7;d++){const dd=new Date();dd.setDate(dd.getDate()-w*7-d);const ds=dd.toISOString().split('T')[0];if(u.checkins&&u.checkins[ds])wks.push(ds);}weeklyData.push(wks.length);}
  const months=new Set(cks.map(d=>d.slice(0,7))).size;
  const aw=weeklyData.filter(n=>n>=3).length;
  return{total,streak,mx,weeklyData,ma:months,aw,prs:u.prs||0};
}
function calcBadges(u,st){

  if(total>=20)earned.push('gymrat');if(total>=30)earned.push('biceps');
  if(total>=50)earned.push('sangre');if(st.mx>=5)earned.push('bronce');
  if(st.mx>=10)earned.push('plata');if(st.mx>=21)earned.push('oro');

}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style')Object.assign(e.style,v);else if(k.startsWith('on'))e[k]=v;else e.setAttribute(k,v);});
  if(children){const arr=Array.isArray(children)?children:[children];arr.forEach(c=>{if(c instanceof Node)e.appendChild(c);else if(c!=null&&c!=='')e.appendChild(document.createTextNode(String(c)));});}
  return e;
}
function miniLineChart(data,color,h,ky,kx){
  if(!data||data.length<2)return el('div');
  const vals=data.map(d=>d[ky]);const mn=Math.min(...vals),mx=Math.max(...vals);
  const rng=mx-mn||1;const W=300,H=h||80;
  const svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('style','width:100%;height:'+H+'px');
  const pts=data.map((d,i)=>{const x=i/(data.length-1)*W;const y=H-(d[ky]-mn)/rng*(H-10)-5;return`${x},${y}`;}).join(' ');
  const area=document.createElementNS(NS,'polygon');
  area.setAttribute('points',`0,${H} ${pts} ${W},${H}`);area.setAttribute('fill',color+'18');svg.appendChild(area);
  const line=document.createElementNS(NS,'polyline');line.setAttribute('points',pts);line.setAttribute('stroke',color);line.setAttribute('stroke-width','2');line.setAttribute('fill','none');svg.appendChild(line);
  data.forEach((d,i)=>{const x=i/(data.length-1)*W;const y=H-(d[ky]-mn)/rng*(H-10)-5;const dot=document.createElementNS(NS,'circle');dot.setAttribute('cx',x);dot.setAttribute('cy',y);dot.setAttribute('r','3');dot.setAttribute('fill',color);svg.appendChild(dot);});
  return svg;
}
function weeklyBarChart(data,color){
  const W=300,H=70;const svg=document.createElementNS(NS,'svg');svg.setAttribute('viewBox',`0 0 ${W} ${H}`);svg.setAttribute('style','width:100%;height:'+H+'px');
  const mx=Math.max(...data,1);const bw=W/data.length-4;
  data.forEach((v,i)=>{const bh=v/mx*(H-16);const x=i*(W/data.length)+2;const bar=document.createElementNS(NS,'rect');bar.setAttribute('x',x);bar.setAttribute('y',H-bh-16);bar.setAttribute('width',bw);bar.setAttribute('height',bh||2);bar.setAttribute('fill',v?color:color+'20');bar.setAttribute('rx','3');svg.appendChild(bar);const lbl=document.createElementNS(NS,'text');lbl.setAttribute('x',x+bw/2);lbl.setAttribute('y',H-2);lbl.setAttribute('text-anchor','middle');lbl.setAttribute('fill',v?color+'88':'#1a1a2a');lbl.setAttribute('font-size','9');lbl.textContent=String(v);svg.appendChild(lbl);});

function heatmapChart(checkins,color){

  for(let w=0;w<8;w++){for(let d=0;d<7;d++){const dt=new Date();dt.setDate(dt.getDate()-(7-w)*7-d);const ds=dt.toISOString().split('T')[0];const act=checkins&&checkins[ds];const rect=document.createElementNS(NS,'rect');rect.setAttribute('x',w*cellW);rect.setAttribute('y',d*(cellH+gap));rect.setAttribute('width',cellW-gap);rect.setAttribute('height',cellH);rect.setAttribute('fill',act?color:'#1a1a2a');rect.setAttribute('rx','2');svg.appendChild(rect);}}

let DRAG=null;
function initDrag(listEl,uid,dayNum){
  let dragCard=null,origIdx=0,placeholder=null;

  const getCardAt=y=>{
    for(const c of listEl.children){
      if(c===dragCard||c===placeholder)continue;
      const r=c.getBoundingClientRect();
      if(y>=r.top&&y<=r.bottom)return c;
    }
    return null;
  };

  listEl.querySelectorAll('[data-drag]').forEach(handle=>{
    handle.addEventListener('mousedown',start);
    handle.addEventListener('touchstart',start,{passive:false});
  });

  function start(e){
    dragCard=e.currentTarget.closest('[data-exid]');
    if(!dragCard)return;
    if(e.type==='touchstart')e.preventDefault();
    origIdx=[...listEl.children].indexOf(dragCard);
    placeholder=el('div',{style:{height:dragCard.offsetHeight+'px',border:'2px dashed #333',borderRadius:'13px',opacity:'0.4',pointerEvents:'none',margin:'0 0 8px'}});
    dragCard.style.opacity='0.3';
    listEl.insertBefore(placeholder,dragCard.nextSibling);
    document.addEventListener('mousemove',move);
    document.addEventListener('touchmove',move,{passive:false});
    document.addEventListener('mouseup',end);
    document.addEventListener('touchend',end);
  }

  function move(e){
    if(!dragCard)return;
    if(e.type==='touchmove')e.preventDefault();
    const y=e.type==='touchmove'?e.touches[0].clientY:e.clientY;
    const over=getCardAt(y);
    if(over){
      const r=over.getBoundingClientRect();
      if(y<r.top+r.height/2)listEl.insertBefore(placeholder,over);
      else listEl.insertBefore(placeholder,over.nextSibling||null);
    }
  }

  function end(){
    if(!dragCard)return;
    dragCard.style.opacity='';
    listEl.insertBefore(dragCard,placeholder);
    placeholder.remove();
    const newIdx=[...listEl.children].indexOf(dragCard);
    if(newIdx!==origIdx)moveExercise(uid,dayNum,origIdx,newIdx);
    dragCard=null;placeholder=null;
    document.removeEventListener('mousemove',move);
    document.removeEventListener('touchmove',move);
    document.removeEventListener('mouseup',end);
    document.removeEventListener('touchend',end);
  }
}

function showSheet(buildFn,onClose){
  const ov=el('div',{class:'sheet-overlay'});
  const sh=el('div',{class:'sheet'});
  sh.appendChild(el('div',{class:'sheet-handle'}));
  const close=()=>{if(document.body.contains(ov))document.body.removeChild(ov);if(onClose)onClose();};
  const content=buildFn(close);
  sh.appendChild(content);
  ov.appendChild(sh);
  ov.onclick=e=>{if(e.target===ov)close();};
  document.body.appendChild(ov);
  return ov;
}

function renderExCard(uid,u,ex,dc,dayNum){
  const card=el('div',{'data-exid':ex.id,style:{background:'#09091a',border:`1px solid ${dc}18`,borderRadius:'13px',padding:'12px 14px',transition:'border-color .2s',display:'flex',flexDirection:'column',gap:'10px'}});

  nameW.appendChild(el('div',{style:{color:'#3a3a55',fontSize:'11px',marginTop:'1px'}},ex.muscle));

  const editBtn=el('button',{style:{background:'transparent',border:`1px solid ${dc}22`,borderRadius:'6px',color:dc+'55',fontSize:'11px',padding:'4px 8px',cursor:'pointer',transition:'all .2s'}});

  editBtn.onclick=e=>{
    e.stopPropagation();
    showEditExModal(ex,dc,(updates)=>{
      // Update sets/reps everywhere this ex appears
      ex.sets=updates.sets;ex.reps=updates.reps;
      // Also update in customEx if custom
      const cu=u.customEx&&u.customEx[dayNum]&&u.customEx[dayNum].find(e=>e.id===ex.id);
      if(cu){cu.sets=updates.sets;cu.reps=updates.reps;}
      // Update in base rt (session-only visual update)
      const baseArr=RT[UC[uid].gender][dayNum]&&RT[UC[uid].gender][dayNum].ex;
      if(baseArr){const bi=baseArr.findIndex(e=>e.id===ex.id);if(bi>=0){baseArr[bi].sets=updates.sets;baseArr[bi].reps=updates.reps;}}
      // Refresh sets/reps tags
      sTag.textContent=`${updates.sets} series`;rTag.textContent=`${updates.reps} reps`;
      saveData();
    });
  };

  const delBtn=el('button',{style:{background:'transparent',border:'1px solid #FF6B6B18',borderRadius:'6px',color:'#FF6B6B33',fontSize:'11px',padding:'4px 8px',cursor:'pointer',transition:'all .2s'}});

  delBtn.onclick=e=>{e.stopPropagation();if(confirm(`¿Eliminar "${ex.name}"?`)){deleteExercise(uid,dayNum,ex.id);card.remove();}};
  actions.append(editBtn,delBtn);top.append(dragH,nameW,actions);

  const meta=el('div',{style:{display:'flex',gap:'8px',alignItems:'center',flexWrap:'wrap'}});
  const curW=u.exWeights&&u.exWeights[ex.id]!==undefined?u.exWeights[ex.id]:ex.w;
  const sTag=el('span',{style:{background:dc+'12',color:dc,padding:'4px 10px',borderRadius:'7px',fontSize:'12px',fontWeight:'600'}},`${ex.sets} series`);
  const rTag=el('span',{style:{background:dc+'12',color:dc,padding:'4px 10px',borderRadius:'7px',fontSize:'12px',fontWeight:'600'}},`${ex.reps} reps`);
  meta.append(sTag,rTag);
  const wWrap=el('div',{style:{marginLeft:'auto',display:'flex',alignItems:'center',gap:'5px'}});
  wWrap.appendChild(el('span',{style:{color:'#3a3a55',fontSize:'11px'}},'peso'));
  const wInput=el('input',{type:'number',style:{width:'54px',background:'#0a0a14',border:`1px solid ${dc}44`,borderRadius:'7px',color:dc,fontWeight:'800',fontSize:'16px',padding:'4px 5px',textAlign:'center',outline:'none'}});
  wInput.value=curW;
  wInput.oninput=()=>{
    const val=parseFloat(wInput.value)||0,prev=u.exWeights&&u.exWeights[ex.id]!==undefined?u.exWeights[ex.id]:ex.w;
    if(val>prev)u.prs=(u.prs||0)+1;
    u.exWeights=u.exWeights||{};u.exWeights[ex.id]=val;
    u.exHistory=u.exHistory||{};u.exHistory[ex.id]=u.exHistory[ex.id]||[];
    const td2=today(),ti=u.exHistory[ex.id].findIndex(h=>h.date===td2);
    if(ti>=0)u.exHistory[ex.id][ti]={date:td2,weight:val};else u.exHistory[ex.id].push({date:td2,weight:val});
    if(u.exHistory[ex.id].length>60)u.exHistory[ex.id].shift();saveData();
  };
  wWrap.append(wInput,el('span',{style:{color:'#3a3a55',fontSize:'11px'}},curW===0?'PC':'kg'));
  meta.appendChild(wWrap);

  const pills=el('div',{style:{display:'flex',gap:'6px'}});
  const mkPill=(lbl,mode)=>{
    const p=el('button',{style:{flex:'1',padding:'8px 4px',background:'#0d0d1e',border:`1px solid ${dc}20`,borderRadius:'8px',color:'#777',fontSize:'11px',fontWeight:'700',cursor:'pointer',letterSpacing:'.5px',transition:'all .15s'}},lbl);

    p.onclick=e=>{e.stopPropagation();showExSheet(uid,u,ex,dc,mode);};return p;
  };
  const hc=(u.exHistory&&u.exHistory[ex.id]&&u.exHistory[ex.id].length)||0;
  pills.append(mkPill('▶ CÓMO HACERLO','como'),mkPill('📈 HISTORIAL'+(hc?` (${hc})`:''),'hist'));
  card.append(top,meta,pills);return card;
}

function fillWeek(uid,u,rt,c,container){

  [1,2,3,4,5].forEach(dn=>{
    const rd=rt[dn],sel=STATE.selDay===dn,isToday=dow===dn,dc=rd?rd.col:c;
    const diff=dn-dow;const dayDate=new Date(td);dayDate.setDate(td.getDate()+diff);
    const dateStr=dayDate.getDate()+'/'+(dayDate.getMonth()+1);
    const btn=el('button',{style:{flex:'1',padding:'6px 3px',borderRadius:'10px',border:`1px solid ${sel?dc+'66':'#0f0f1a'}`,background:sel?dc+'10':'#09091a',cursor:'pointer',textAlign:'center',transition:'all .2s',position:'relative'}});

  const bbCard=card();

  infoBtn.onclick=()=>showSheet(close=>{
    const w=el('div');w.appendChild(el('div',{class:'bc',style:{fontSize:'20px',color:c,marginBottom:'14px'}},'CÓMO CONSEGUIR LAS INSIGNIAS'));
    const list=el('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}});

      const earned=eb.includes(b.id);

      r.appendChild(badgeSVG(b.id,b.col,30,earned));
      const info2=el('div',{style:{flex:'1'}});
      info2.appendChild(el('div',{style:{color:earned?b.col:'#bbb',fontSize:'13px',fontWeight:'700',marginBottom:'2px'}},b.name));
      info2.appendChild(el('div',{style:{color:'#444',fontSize:'11px',lineHeight:'1.5'}},b.desc));
      if(earned)info2.appendChild(el('div',{style:{color:b.col,fontSize:'10px',marginTop:'2px'}},'✓ CONSEGUIDA'));
      r.appendChild(info2);list.appendChild(r);
    });
    w.appendChild(list);return w;
  });
  bbHdr.appendChild(infoBtn);
  const bg=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}});
  BADGES.forEach(b=>{
    const earned=eb.includes(b.id);
    const d=el('div',{style:{background:earned?b.col+'0a':'#07070f',border:`1px solid ${earned?b.col+'22':'#111'}`,borderRadius:'10px',padding:'10px 6px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:'4px',cursor:'pointer',transition:'transform .15s'}});
    d.onmouseenter=()=>d.style.transform='scale(1.04)';d.onmouseleave=()=>d.style.transform='scale(1)';
    d.appendChild(badgeSVG(b.id,b.col,32,earned));
    d.appendChild(el('div',{style:{color:earned?b.col:'#2a2a3a',fontSize:'9px',fontWeight:'700',lineHeight:'1.3',textAlign:'center'}},b.name));
    d.onclick=()=>showSheet(close=>{
      const sw=el('div',{style:{textAlign:'center'}});
      const bww=el('div',{style:{display:'flex',justifyContent:'center',marginBottom:'10px'}});bww.appendChild(badgeSVG(b.id,b.col,64,earned));sw.appendChild(bww);
      sw.appendChild(el('div',{class:'bc',style:{fontSize:'26px',color:b.col,marginBottom:'4px'}},b.name));
      sw.appendChild(el('div',{style:{color:earned?'#7CFF6B':'#555',fontSize:'11px',marginBottom:'12px'}},earned?'✅ CONSEGUIDA':'🔒 BLOQUEADA'));
      const db=el('div',{style:{background:b.col+'08',border:`1px solid ${b.col}1a`,borderRadius:'10px',padding:'12px',textAlign:'left'}});
      db.appendChild(el('div',{style:{color:'#555',fontSize:'10px',fontWeight:'700',marginBottom:'5px',letterSpacing:'1px'}},'REQUISITOS'));
      db.appendChild(el('div',{style:{color:'#aaa',fontSize:'13px',lineHeight:'1.8'}},b.desc));sw.appendChild(db);
      if(b.special&&earned){sw.appendChild(el('div',{style:{marginTop:'12px',background:b.col+'0f',border:`1px solid ${b.col}22`,borderRadius:'10px',padding:'13px',color:'#ccc',fontSize:'12px',lineHeight:'1.85',fontStyle:'italic'}},b.special));}
      return sw;
    });
    bg.appendChild(d);
  });
  bbCard.append(bbHdr,bg);

  // Reset
  const resetCard=card({borderColor:'#FF6B6B18'});resetCard.appendChild(sHdr('Zona de Peligro'));
  resetCard.appendChild(el('div',{style:{color:'#444',fontSize:'12px',lineHeight:'1.7',marginBottom:'12px'}},'El reset borra todo: sesiones, pesos, insignias, PIN. Útil si llevas tiempo sin entrenar y quieres empezar de cero.'));
  const resetBtn=el('button',{class:'bc',style:{background:'transparent',border:'1px solid #FF6B6B44',borderRadius:'10px',color:'#FF6B6B',fontSize:'13px',padding:'11px 20px',cursor:'pointer',width:'100%',letterSpacing:'1px'}});
  resetBtn.textContent='⚠ RESET DE PERFIL';
  resetBtn.onclick=()=>{
    const doReset=()=>{if(confirm(`¿SEGURO? Se borra TODO de ${conf.name}. No se puede deshacer.`)){DATA.users[uid]=dU();saveData();go('home');setTimeout(()=>alert(`Perfil de ${conf.name} reseteado. ¡Nueva oportunidad! 💪`),100);}};
    if(u.pin)showPinScreen(uid,'reset-verify',doReset);else doReset();
  };
  resetCard.appendChild(resetBtn);

  container.append(hero,hmCard,volCard,bdCard,measCard,wCard,pinCard,mascWrap,bbCard,resetCard);
}

// ──────────────────────────────────────────
// BOOT — Firebase async
// ──────────────────────────────────────────
initFirebase();
let _fbBooted=false;
if(DB){
  DB.ref('/').on('value',snapshot=>{
    const incoming=normalizeData(snapshot.val());
    DATA=incoming;
    if(!_fbBooted){
      _fbBooted=true;
      document.getElementById('fallback').style.display='none';
      document.getElementById('root').style.display='block';
      render();
    } else {
      // Re-render home silently when other users update data
      if(STATE.screen==='home')render();
      // If there are new notifications for current user, show them
      else if(STATE.screen==='user'&&DATA.notifications&&DATA.notifications.some(n=>n.targetUid===STATE.user)){
        go('notif');
      }
    }
  },err=>{
    // Firebase error — fallback to empty data
    DATA=dD();
    document.getElementById('fallback').style.display='none';
    document.getElementById('root').style.display='block';
    document.getElementById('errMsg').textContent='Sin conexión con la nube. Comprueba tu conexión.';
    render();
  });
} else {
  DATA=dD();
  document.getElementById('fallback').style.display='none';
  document.getElementById('root').style.display='block';
  render();
}

// ── PWA: Service Worker ──
if('serviceWorker' in navigator){
  const swCode=`
const CACHE='gymtracker-v1';
self.addEventListener('install',e=>e.waitUntil(
  caches.open(CACHE).then(c=>c.addAll([self.location.pathname]))
));
self.addEventListener('fetch',e=>e.respondWith(
  caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
    const clone=res.clone();
    caches.open(CACHE).then(c=>c.put(e.request,clone));
    return res;
  }))
));
self.addEventListener('activate',e=>e.waitUntil(
  caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))
));`;
  const blob=new Blob([swCode],{type:'application/javascript'});
  const swUrl=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ── PWA: Install banner ──
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const banner=document.createElement('div');
  banner.id='install-banner';
  Object.assign(banner.style,{position:'fixed',bottom:'16px',left:'50%',transform:'translateX(-50%)',background:'#0d0d1e',border:'1px solid #00D4FF33',borderRadius:'14px',padding:'12px 18px',display:'flex',alignItems:'center',gap:'12px',zIndex:'9999',boxShadow:'0 4px 24px #00D4FF18',animation:'fadeUp .4s ease',maxWidth:'340px',width:'calc(100% - 32px)',boxSizing:'border-box'});
  banner.innerHTML=`<span style="font-size:26px">💪</span><div style="flex:1"><div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;color:#00D4FF;letter-spacing:1px">INSTALAR APP</div><div style="font-size:11px;color:#555;margin-top:1px">Añade Gym Tracker a tu pantalla</div></div><button id="install-btn" style="background:#00D4FF;color:#000;border:none;border-radius:8px;padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:13px;letter-spacing:1px;cursor:pointer">INSTALAR</button><button id="install-close" style="background:none;border:none;color:#333;font-size:18px;cursor:pointer;padding:0 2px;line-height:1">✕</button>`;
  document.body.appendChild(banner);
  document.getElementById('install-btn').onclick=async()=>{deferredPrompt.prompt();const{outcome}=await deferredPrompt.userChoice;if(outcome==='accepted')banner.remove();deferredPrompt=null;};
  document.getElementById('install-close').onclick=()=>banner.remove();
});
}catch(e){
  document.getElementById('fallback').style.display='flex';
  document.getElementById('root').style.display='none';
  document.getElementById('errMsg').textContent='Error: '+e.message+'\n'+(e.stack||'');
}
</script>
